<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mirror MR Test — Quest 3</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

  #status {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.75); text-align: center;
    padding: 10px 16px; font-size: 15px; z-index: 20;
    letter-spacing: 0.02em;
  }

  #ui {
    position: fixed; bottom: 36px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 14px; z-index: 20;
  }

  button {
    padding: 16px 28px; font-size: 17px; font-weight: bold;
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #btnStart  { background: #4caf50; color: white; }
  #btnStart.ending { background: #f44336; }
  #btnToggle { background: #2196f3; color: white; display: none; }
  #btnToggle.off { background: #ff9800; }

</style>

<body>

<div id="status">Quest 3 브라우저에서 열어주세요 (HTTPS 필요)</div>

  <div class="icon">🥽</div>
  <div class="desc">Quest 3 브라우저에서<br>AR 시작 버튼을 누르세요</div>
</div>

<div id="ui">
  <button id="btnStart">AR 시작</button>
  <button id="btnToggle">시나리오 전환</button>
  <button id="btnSummon">구체 소환</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ────────────────────────────────────────────────────────────────
//  CONSTANTS
// ────────────────────────────────────────────────────────────────
const MIRROR_DIST  = 1.5;
const CUBE_SIZE    = 0.20;
const HEAD_ABOVE   = 0.30;

const SPHERE_RADIUS      = 0.12;
const SPHERE_MOVE_SPEED  = 0.35;
const SPHERE_STOP_DIST   = 0.5;
const SPHERE_HOVER_TIME  = 3.0;
const SPHERE_RISE_SPEED  = 0.12;
const SPHERE_FADE_SPEED  = 0.35;

// WebXR hand joint names (spec order, 25 joints)
const HAND_JOINTS = [
  'wrist',
  'thumb-metacarpal', 'thumb-phalanx-proximal', 'thumb-phalanx-distal', 'thumb-tip',
  'index-finger-metacarpal', 'index-finger-phalanx-proximal', 'index-finger-phalanx-intermediate', 'index-finger-phalanx-distal', 'index-finger-tip',
  'middle-finger-metacarpal', 'middle-finger-phalanx-proximal', 'middle-finger-phalanx-intermediate', 'middle-finger-phalanx-distal', 'middle-finger-tip',
  'ring-finger-metacarpal', 'ring-finger-phalanx-proximal', 'ring-finger-phalanx-intermediate', 'ring-finger-phalanx-distal', 'ring-finger-tip',
  'pinky-finger-metacarpal', 'pinky-finger-phalanx-proximal', 'pinky-finger-phalanx-intermediate', 'pinky-finger-phalanx-distal', 'pinky-finger-tip'
];

// Bone connections for skeleton lines
const HAND_CONNECTIONS = [
  ['wrist', 'thumb-metacarpal'],
  ['wrist', 'index-finger-metacarpal'],
  ['wrist', 'middle-finger-metacarpal'],
  ['wrist', 'ring-finger-metacarpal'],
  ['wrist', 'pinky-finger-metacarpal'],
  ['index-finger-metacarpal', 'middle-finger-metacarpal'],
  ['middle-finger-metacarpal', 'ring-finger-metacarpal'],
  ['ring-finger-metacarpal', 'pinky-finger-metacarpal'],
  ['thumb-metacarpal', 'thumb-phalanx-proximal'],
  ['thumb-phalanx-proximal', 'thumb-phalanx-distal'],
  ['thumb-phalanx-distal', 'thumb-tip'],
  ['index-finger-metacarpal', 'index-finger-phalanx-proximal'],
  ['index-finger-phalanx-proximal', 'index-finger-phalanx-intermediate'],
  ['index-finger-phalanx-intermediate', 'index-finger-phalanx-distal'],
  ['index-finger-phalanx-distal', 'index-finger-tip'],
  ['middle-finger-metacarpal', 'middle-finger-phalanx-proximal'],
  ['middle-finger-phalanx-proximal', 'middle-finger-phalanx-intermediate'],
  ['middle-finger-phalanx-intermediate', 'middle-finger-phalanx-distal'],
  ['middle-finger-phalanx-distal', 'middle-finger-tip'],
  ['ring-finger-metacarpal', 'ring-finger-phalanx-proximal'],
  ['ring-finger-phalanx-proximal', 'ring-finger-phalanx-intermediate'],
  ['ring-finger-phalanx-intermediate', 'ring-finger-phalanx-distal'],
  ['ring-finger-phalanx-distal', 'ring-finger-tip'],
  ['pinky-finger-metacarpal', 'pinky-finger-phalanx-proximal'],
  ['pinky-finger-phalanx-proximal', 'pinky-finger-phalanx-intermediate'],
  ['pinky-finger-phalanx-intermediate', 'pinky-finger-phalanx-distal'],
  ['pinky-finger-phalanx-distal', 'pinky-finger-tip'],
];

// ────────────────────────────────────────────────────────────────
//  THREE.JS SCENE
// ────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x000000, 0);
renderer.localClippingEnabled = true;
document.body.appendChild(renderer.domElement);

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 2.5));
const dl = new THREE.DirectionalLight(0xffffff, 2.0);
dl.position.set(1, 3, 1);
scene.add(dl);

// ── 빨간 큐브 ──────────────────────────────────────────────────
const cubeGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

const realCube = new THREE.Mesh(
  cubeGeo,
  new THREE.MeshStandardMaterial({ color: 0xff1a1a, roughness: 0.25, metalness: 0.15 })
);
scene.add(realCube);

const mirrorCube = new THREE.Mesh(
  cubeGeo,
  new THREE.MeshStandardMaterial({ color: 0xff7777, roughness: 0.25, metalness: 0.15 })
);
scene.add(mirrorCube);

// ── 바닥 가이드 (1.5m 기준선) ──────────────────────────────────
const guideGroup = new THREE.Group();
scene.add(guideGroup);
guideGroup.visible = false;

const barMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide });

guideGroup.add(
  Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.012, 0.04), barMat))
);
[-0.58, 0.58].forEach(x => {
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.28, 0.04), barMat);
  post.position.set(x, 0.14, 0);
  guideGroup.add(post);
});
const arrowGeo = new THREE.ConeGeometry(0.06, 0.15, 4);
arrowGeo.rotateX(Math.PI / 2);
const arrow = new THREE.Mesh(arrowGeo, barMat);
arrow.position.set(0, 0.006, -0.12);
guideGroup.add(arrow);

// ────────────────────────────────────────────────────────────────
//  구체: 거울을 통과하는 오브젝트
// ────────────────────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 32, 32);

const grayMat = new THREE.MeshStandardMaterial({
  color: 0x9e9e9e, roughness: 0.4, metalness: 0.5,
  transparent: true, opacity: 1
});
const graySphere = new THREE.Mesh(sphereGeo, grayMat);
graySphere.visible = false;
scene.add(graySphere);

const blueMat = new THREE.MeshStandardMaterial({
  color: 0x1565c0, roughness: 0.15, metalness: 0.4,
  transparent: true, opacity: 1,
  emissive: new THREE.Color(0x0d47a1), emissiveIntensity: 0.35
});
const blueSphere = new THREE.Mesh(sphereGeo, blueMat);
blueSphere.visible = false;
scene.add(blueSphere);

// ── 거울 통과 이펙트 ──────────────────────────────────────────
const RIPPLE_COUNT = 3;
const rippleMeshes = [];
const rippleMats  = [];
for (let i = 0; i < RIPPLE_COUNT; i++) {
  const rMat = new THREE.MeshBasicMaterial({
    color: 0x4fc3f7, transparent: true, opacity: 0, side: THREE.DoubleSide
  });
  const rMesh = new THREE.Mesh(new THREE.TorusGeometry(1, 0.018, 8, 48), rMat);
  rMesh.visible = false;
  scene.add(rMesh);
  rippleMeshes.push(rMesh);
  rippleMats.push(rMat);
}

const flashMat = new THREE.MeshBasicMaterial({ color: 0x90caf9, transparent: true, opacity: 0 });
const flashMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), flashMat);
flashMesh.visible = false;
scene.add(flashMesh);

const mirrorLight = new THREE.PointLight(0x4fc3f7, 0, 4);
scene.add(mirrorLight);

let grayClipPlane = null;
let blueClipPlane = null;

// ────────────────────────────────────────────────────────────────
//  HAND TRACKING — XR 손 공간 (조인트 데이터 소스)
// ────────────────────────────────────────────────────────────────
const hand1 = renderer.xr.getHand(0);
scene.add(hand1);

const hand2 = renderer.xr.getHand(1);
scene.add(hand2);

// ────────────────────────────────────────────────────────────────
//  손 시각화 팩토리 — 조인트 구체 + 본 라인
//  realHand: 흰색/크림, mirrorHand: 파란색
// ────────────────────────────────────────────────────────────────
function createHandVis(jointColor, lineColor, emissiveColor) {
  const group = new THREE.Group();

  const jointMat = new THREE.MeshStandardMaterial({
    color: jointColor,
    transparent: true,
    opacity: 0.85,
    roughness: 0.2,
    metalness: 0.5,
    emissive: new THREE.Color(emissiveColor),
    emissiveIntensity: 0.35
  });
  const jointGeo = new THREE.SphereGeometry(0.008, 8, 8);
  const joints = {};

  HAND_JOINTS.forEach(name => {
    const mesh = new THREE.Mesh(jointGeo, jointMat);
    mesh.visible = false;
    group.add(mesh);
    joints[name] = mesh;
  });

  // 본 라인 세그먼트
  const linePositions = new Float32Array(HAND_CONNECTIONS.length * 6);
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: lineColor, transparent: true, opacity: 0.6
  });
  const lines = new THREE.LineSegments(lineGeo, lineMat);
  lines.visible = false;
  lines.frustumCulled = false;
  group.add(lines);

  return { group, joints, lines, lineGeo, linePositions };
}

// 실제 손 — 흰색/크림
const realVis1 = createHandVis(0xffe8d6, 0xffccaa, 0xffaa66);
const realVis2 = createHandVis(0xffe8d6, 0xffccaa, 0xffaa66);
scene.add(realVis1.group);
scene.add(realVis2.group);

// 거울 손 — 파란색
const mirrorVis1 = createHandVis(0x88ccff, 0x55aaff, 0x2255ff);
const mirrorVis2 = createHandVis(0x88ccff, 0x55aaff, 0x2255ff);
scene.add(mirrorVis1.group);
scene.add(mirrorVis2.group);

// ────────────────────────────────────────────────────────────────
//  핀치 구체 — 지름 15cm, 노란→초록, 실제+거울 각 2개
// ────────────────────────────────────────────────────────────────
const PINCH_SPHERE_R    = 0.075;  // 반지름 7.5cm (지름 15cm)
const PINCH_THRESHOLD   = 0.02;   // 핀치 판정 거리 (m)
const PINCH_COL_NORMAL  = new THREE.Color(0xffee00); // 노란색
const PINCH_COL_ACTIVE  = new THREE.Color(0x00e676); // 초록색
const PINCH_EMI_NORMAL  = new THREE.Color(0x443300);
const PINCH_EMI_ACTIVE  = new THREE.Color(0x003311);

function createPinchSphere() {
  const mat = new THREE.MeshStandardMaterial({
    color: PINCH_COL_NORMAL.clone(),
    roughness: 0.15,
    metalness: 0.25,
    transparent: true,
    opacity: 0.88,
    emissive: PINCH_EMI_NORMAL.clone(),
    emissiveIntensity: 0.5
  });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(PINCH_SPHERE_R, 28, 28), mat);
  mesh.visible = false;
  scene.add(mesh);
  return { mesh, mat };
}

// 실제 손 핀치 구체 (hand1 / hand2)
const pinch1 = createPinchSphere();
const pinch2 = createPinchSphere();
// 거울 핀치 구체 (Z 반전)
const mirrorPinch1 = createPinchSphere();
const mirrorPinch2 = createPinchSphere();

// ────────────────────────────────────────────────────────────────
//  GLOBAL STATE
// ────────────────────────────────────────────────────────────────
let spawnPos       = null;
let spawnEyeY      = 1.5;
let mirrorZ        = 0;
let scenario       = 1;
let currentSession = null;

let spherePhase     = 'idle';
let sphereZ         = 0;
let sphereY         = 1.5;
let sphereAlpha     = 1;
let sphereHoverTime = 0;
let prevTimestamp   = 0;

let mirrorEffectTimer = -1;
let mirrorTouched     = false;

// ────────────────────────────────────────────────────────────────
//  HELPER
// ────────────────────────────────────────────────────────────────
function reflectZ(z) { return 2 * mirrorZ - z; }

function resetSphereVisuals() {
  graySphere.visible = false;
  blueSphere.visible = false;
  grayMat.opacity    = 1;
  blueMat.opacity    = 1;
}

function triggerMirrorEffect(x, y, z) {
  mirrorEffectTimer = 0;
  rippleMeshes.forEach((m, i) => {
    m.position.set(x, y, z);
    m.scale.setScalar(0.01);
    m.visible = true;
    rippleMats[i].opacity = 0;
  });
  flashMesh.position.set(x, y, z);
  flashMesh.scale.setScalar(0.01);
  flashMesh.visible = true;
  flashMat.opacity  = 0;
  mirrorLight.position.set(x, y, z);
  mirrorLight.intensity = 0;
}

function updateMirrorEffect(dt) {
  if (mirrorEffectTimer < 0) return;
  mirrorEffectTimer += dt;

  const t = mirrorEffectTimer;
  const RING_DELAY    = 0.13;
  const RING_DURATION = 0.65;
  const MAX_RADIUS    = 0.55;
  const TOTAL_TIME    = RING_DELAY * (RIPPLE_COUNT - 1) + RING_DURATION + 0.1;

  rippleMeshes.forEach((mesh, i) => {
    const localT = t - i * RING_DELAY;
    if (localT <= 0 || localT > RING_DURATION) { mesh.visible = false; return; }
    const p = localT / RING_DURATION;
    mesh.scale.setScalar(p * MAX_RADIUS);
    rippleMats[i].opacity = (1 - p) * 0.75;
    mesh.visible = true;
  });

  const FLASH_DUR = 0.25;
  if (t < FLASH_DUR) {
    const fp = t / FLASH_DUR;
    flashMesh.scale.setScalar(fp * 0.3);
    flashMat.opacity = (1 - fp) * 0.9;
    flashMesh.visible = true;
  } else {
    flashMesh.visible = false;
  }

  const LIGHT_DUR = 0.3;
  mirrorLight.intensity = t < LIGHT_DUR
    ? Math.sin((t / LIGHT_DUR) * Math.PI) * 4.0
    : 0;

  if (t > TOTAL_TIME) {
    mirrorEffectTimer = -1;
    rippleMeshes.forEach(m => { m.visible = false; });
    flashMesh.visible     = false;
    mirrorLight.intensity = 0;
  }
}

function startSphereAnimation() {
  sphereZ           = mirrorZ - 1.0;
  sphereY           = spawnEyeY;
  spherePhase       = 'moving';
  sphereAlpha       = 1;
  grayMat.opacity   = 1;
  blueMat.opacity   = 1;
  mirrorTouched     = false;
  mirrorEffectTimer = -1;
}

function updateSphere(timestamp, userZ) {
  if (spherePhase === 'idle' || !spawnPos) { resetSphereVisuals(); return; }

  const dt = prevTimestamp > 0
    ? Math.min((timestamp - prevTimestamp) / 1000, 0.05)
    : 0.016;

  if (spherePhase === 'moving') {
    sphereZ += SPHERE_MOVE_SPEED * dt;
    const stopZ = userZ - SPHERE_STOP_DIST;
    if (sphereZ >= stopZ) {
      sphereZ = stopZ;
      spherePhase     = 'hovering';
      sphereHoverTime = SPHERE_HOVER_TIME;
    }
  } else if (spherePhase === 'hovering') {
    sphereHoverTime -= dt;
    if (sphereHoverTime <= 0) spherePhase = 'rising';
  } else if (spherePhase === 'rising') {
    sphereY     += SPHERE_RISE_SPEED * dt;
    sphereAlpha -= SPHERE_FADE_SPEED * dt;
    grayMat.opacity = Math.max(sphereAlpha, 0);
    blueMat.opacity = Math.max(sphereAlpha, 0);
    if (sphereAlpha <= 0) {
      spherePhase = 'idle';
      resetSphereVisuals();
      btnSummon.textContent = '구체 소환';
      btnSummon.classList.remove('active');
      return;
    }
  }

  const bob  = Math.sin(timestamp * 0.0025) * 0.015;
  const posX = spawnPos.x;
  const posY = sphereY + bob;
  const posZ = sphereZ;

  graySphere.position.set(posX, posY, posZ);
  blueSphere.position.set(posX, posY, posZ);

  const fullyBehind  = posZ < mirrorZ - SPHERE_RADIUS;
  const fullyInFront = posZ > mirrorZ + SPHERE_RADIUS;

  if (fullyBehind) {
    grayMat.clippingPlanes = [];
    graySphere.visible = true;
    blueSphere.visible = false;
  } else if (fullyInFront) {
    blueMat.clippingPlanes = [];
    graySphere.visible = false;
    blueSphere.visible = true;
  } else {
    grayMat.clippingPlanes = [grayClipPlane];
    blueMat.clippingPlanes = [blueClipPlane];
    graySphere.visible = true;
    blueSphere.visible = true;
    if (!mirrorTouched) {
      mirrorTouched = true;
      triggerMirrorEffect(posX, posY, mirrorZ);
    }
  }

  updateMirrorEffect(dt);
}

// ────────────────────────────────────────────────────────────────
//  손 시각화 업데이트 — invertZ=true 이면 거울 손
// ────────────────────────────────────────────────────────────────
const _tmpPos = new THREE.Vector3();

function updateHandVis(realHand, vis, invertZ) {
  if (!spawnPos) {
    HAND_JOINTS.forEach(n => { vis.joints[n].visible = false; });
    vis.lines.visible = false;
    return;
  }

  let anyJoint = false;

  for (const name of HAND_JOINTS) {
    const joint  = realHand.joints[name];
    const sphere = vis.joints[name];
    if (joint && joint.visible) {
      joint.getWorldPosition(_tmpPos);
      const z = invertZ ? 2 * mirrorZ - _tmpPos.z : _tmpPos.z;
      sphere.position.set(_tmpPos.x, _tmpPos.y, z);
      sphere.visible = true;
      anyJoint = true;
    } else {
      sphere.visible = false;
    }
  }

  const pos = vis.linePositions;
  HAND_CONNECTIONS.forEach(([a, b], i) => {
    const ma = vis.joints[a];
    const mb = vis.joints[b];
    const base = i * 6;
    if (ma.visible && mb.visible) {
      pos[base]     = ma.position.x; pos[base + 1] = ma.position.y; pos[base + 2] = ma.position.z;
      pos[base + 3] = mb.position.x; pos[base + 4] = mb.position.y; pos[base + 5] = mb.position.z;
    } else {
      for (let k = 0; k < 6; k++) pos[base + k] = 0;
    }
  });
  vis.lineGeo.attributes.position.needsUpdate = true;
  vis.lines.visible = anyJoint;
}

// ────────────────────────────────────────────────────────────────
//  핀치 감지 & 구체 업데이트
// ────────────────────────────────────────────────────────────────
const _indexPos = new THREE.Vector3();
const _thumbPos = new THREE.Vector3();

function updatePinchSphere(realHand, pinchVis, mirrorPinchVis) {
  const indexJoint = realHand.joints['index-finger-tip'];
  const thumbJoint  = realHand.joints['thumb-tip'];

  if (!indexJoint || !thumbJoint || !indexJoint.visible || !thumbJoint.visible) {
    pinchVis.mesh.visible       = false;
    mirrorPinchVis.mesh.visible = false;
    return;
  }

  indexJoint.getWorldPosition(_indexPos);
  thumbJoint.getWorldPosition(_thumbPos);

  const isPinching = _indexPos.distanceTo(_thumbPos) < PINCH_THRESHOLD;

  // 색 전환 (스냅)
  const col = isPinching ? PINCH_COL_ACTIVE : PINCH_COL_NORMAL;
  const emi = isPinching ? PINCH_EMI_ACTIVE : PINCH_EMI_NORMAL;
  pinchVis.mat.color.copy(col);
  pinchVis.mat.emissive.copy(emi);
  mirrorPinchVis.mat.color.copy(col);
  mirrorPinchVis.mat.emissive.copy(emi);

  // 중심점 = 두 끝 관절의 중간
  const mx = (_indexPos.x + _thumbPos.x) * 0.5;
  const my = (_indexPos.y + _thumbPos.y) * 0.5;
  const mz = (_indexPos.z + _thumbPos.z) * 0.5;

  pinchVis.mesh.position.set(mx, my, mz);
  pinchVis.mesh.visible = true;

  // 거울: Z 반전 (spawnPos가 있어야 mirrorZ가 확정됨)
  if (spawnPos) {
    mirrorPinchVis.mesh.position.set(mx, my, 2 * mirrorZ - mz);
    mirrorPinchVis.mesh.visible = true;
  }
}

// ────────────────────────────────────────────────────────────────
//  UI
// ────────────────────────────────────────────────────────────────
const statusEl  = document.getElementById('status');
const toggleBtn = document.getElementById('btnToggle');
const btnSummon = document.getElementById('btnSummon');

function setStatus(text) { statusEl.textContent = text; }

toggleBtn.onclick = () => {
  scenario = scenario === 1 ? 2 : 1;
  if (scenario === 1) {
    toggleBtn.textContent = '시나리오 전환';
    toggleBtn.classList.remove('off');
    setStatus('시나리오 1 — 현실 큐브 ON + 거울 큐브 | 전환 버튼으로 시나리오 2');
  } else {
    toggleBtn.textContent = '시나리오 1로 돌아가기';
    toggleBtn.classList.add('off');
    setStatus('시나리오 2 — 거울 큐브만 (현실에선 안 보임)');
  }
};

btnSummon.onclick = () => {
  if (!spawnPos) return;
  if (spherePhase !== 'idle') {
    spherePhase = 'idle';
    resetSphereVisuals();
    btnSummon.textContent = '구체 소환';
    btnSummon.classList.remove('active');
    return;
  }
  startSphereAnimation();
  btnSummon.textContent = '소환 취소';
  btnSummon.classList.add('active');
};

// ────────────────────────────────────────────────────────────────
//  AR SESSION
// ────────────────────────────────────────────────────────────────
const btnStart = document.getElementById('btnStart');

function enterSessionUI(session) {
  currentSession = session;
  btnStart.textContent = 'AR 종료';
  btnStart.classList.add('ending');
  document.getElementById('hint').style.display = 'none';
  toggleBtn.style.display = 'inline-block';
  btnSummon.style.display = 'inline-block';
}

function exitSessionUI() {
  currentSession = null;
  btnStart.textContent = 'AR 시작';
  btnStart.classList.remove('ending');
  toggleBtn.style.display = 'none';
  btnSummon.style.display = 'none';
  btnSummon.textContent = '구체 소환';
  btnSummon.classList.remove('active');
  spawnPos = null;
  guideGroup.visible = false;
  spherePhase = 'idle';
  resetSphereVisuals();
  setStatus('세션 종료됨');
  renderer.setAnimationLoop(null);
}

btnStart.onclick = async () => {
  if (currentSession) { currentSession.end(); return; }

  if (!navigator.xr) {
    setStatus('⚠ WebXR 없음 — Quest 브라우저인가요?');
    return;
  }

  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!ok) {
    setStatus('⚠ immersive-ar 미지원 — Quest 브라우저 + 최신 OS 필요');
    return;
  }

  let session;
  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['dom-overlay', 'hand-tracking'],
      domOverlay: { root: document.getElementById('ui') }
    });
  } catch (e) {
    setStatus('⚠ 세션 시작 실패: ' + e.message);
    return;
  }

  await renderer.xr.setSession(session);
  const refSpace = await session.requestReferenceSpace('local-floor');

  enterSessionUI(session);
  setStatus('⏳ 스폰 위치 초기화 중...');

  session.addEventListener('visibilitychange', () => {
    if (session.visibilityState === 'visible') setStatus('▶ AR 재개됨');
  });
  session.addEventListener('end', exitSessionUI);

  // ── 메인 루프 ──────────────────────────────────────────────
  renderer.setAnimationLoop((timestamp, frame) => {
    if (!frame) { renderer.render(scene, camera); return; }

    const pose = frame.getViewerPose(refSpace);
    if (!pose) { renderer.render(scene, camera); return; }

    const h = pose.transform.position;

    // ── 최초 1회: 스폰 포지션 & 거울 평면 기록 ──────────────
    if (!spawnPos) {
      spawnPos  = { x: h.x, z: h.z };
      spawnEyeY = h.y;
      mirrorZ   = h.z - MIRROR_DIST;

      grayClipPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1),  mirrorZ);
      blueClipPlane = new THREE.Plane(new THREE.Vector3(0, 0,  1), -mirrorZ);

      guideGroup.position.set(h.x, 0.005, mirrorZ);
      guideGroup.visible = true;

      setStatus(
        `✓ 준비 완료 | 거울 위치(앞 ${MIRROR_DIST}m) | 손 들어보세요 — 거울에 비칩니다`
      );
    }

    // ── 큐브: 머리 위 30cm, 실시간 추적 ─────────────────────
    const cx = h.x, cy = h.y + HEAD_ABOVE, cz = h.z;
    realCube.position.set(cx, cy, cz);
    realCube.visible = (scenario === 1);
    mirrorCube.position.set(cx, cy, reflectZ(cz));
    mirrorCube.visible = true;

    // ── 구체 ──────────────────────────────────────────────────
    updateSphere(timestamp, h.z);
    prevTimestamp = timestamp;

    // ── 실제 손 (패스스루 위 크림색) ─────────────────────────
    updateHandVis(hand1, realVis1, false);
    updateHandVis(hand2, realVis2, false);

    // ── 거울 손 (Z 반전 파란색) ───────────────────────────────
    updateHandVis(hand1, mirrorVis1, true);
    updateHandVis(hand2, mirrorVis2, true);

    // ── 핀치 구체 (실제 + 거울) ───────────────────────────────
    updatePinchSphere(hand1, pinch1, mirrorPinch1);
    updatePinchSphere(hand2, pinch2, mirrorPinch2);

    renderer.render(scene, camera);
  });
};
</script>
