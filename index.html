<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mirror MR Test — Quest 3</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #0d0d0d; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

  #status {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.75); text-align: center;
    padding: 10px 16px; font-size: 15px; z-index: 20;
    letter-spacing: 0.02em;
  }

  #ui {
    position: fixed; bottom: 36px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 14px; z-index: 20;
  }

  button {
    padding: 16px 28px; font-size: 17px; font-weight: bold;
    border: none; border-radius: 12px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #btnStart  { background: #4caf50; color: white; }
  #btnStart.ending { background: #f44336; }
  #btnToggle { background: #2196f3; color: white; display: none; }
  #btnToggle.off { background: #ff9800; }
  #btnSummon { background: #7b1fa2; color: white; display: none; }
  #btnSummon.active { background: #e91e63; }

  #hint {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; opacity: 0.35; pointer-events: none;
  }
  #hint .icon { font-size: 56px; }
  #hint .desc { margin-top: 14px; font-size: 14px; line-height: 1.7; }
</style>
</head>
<body>

<div id="status">Quest 3 브라우저에서 열어주세요 (HTTPS 필요)</div>

<div id="hint">
  <div class="icon">🥽</div>
  <div class="desc">Quest 3 브라우저에서<br>AR 시작 버튼을 누르세요</div>
</div>

<div id="ui">
  <button id="btnStart">AR 시작</button>
  <button id="btnToggle">시나리오 전환</button>
  <button id="btnSummon">구체 소환</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ────────────────────────────────────────────────────────────────
//  CONSTANTS
// ────────────────────────────────────────────────────────────────
const MIRROR_DIST  = 1.5;   // 거울까지 거리 (m)
const CUBE_SIZE    = 0.20;  // 큐브 한 변 길이 (m)
const HEAD_ABOVE   = 0.30;  // 머리 위 높이 (m)

// 구체
const SPHERE_RADIUS      = 0.12;   // 구체 반지름 (m)
const SPHERE_MOVE_SPEED  = 0.35;   // 접근 속도 (m/s)
const SPHERE_STOP_DIST   = 0.5;    // 사용자 앞에서 멈출 거리 (m)
const SPHERE_HOVER_TIME  = 3.0;    // 멈추고 호버링하는 시간 (초)
const SPHERE_RISE_SPEED  = 0.12;   // 위로 떠오르는 속도 (m/s)
const SPHERE_FADE_SPEED  = 0.35;   // 소멸 속도 (opacity/s)

// ────────────────────────────────────────────────────────────────
//  THREE.JS SCENE
// ────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
renderer.setClearColor(0x000000, 0);
renderer.localClippingEnabled = true;  // 구체 반반 클리핑에 필요
document.body.appendChild(renderer.domElement);

// 조명
scene.add(new THREE.AmbientLight(0xffffff, 2.5));
const dl = new THREE.DirectionalLight(0xffffff, 2.0);
dl.position.set(1, 3, 1);
scene.add(dl);

// ── 빨간 큐브 ──────────────────────────────────────────────────
const cubeGeo = new THREE.BoxGeometry(CUBE_SIZE, CUBE_SIZE, CUBE_SIZE);

// 현실 큐브 (선명한 빨강)
const realCube = new THREE.Mesh(
  cubeGeo,
  new THREE.MeshStandardMaterial({ color: 0xff1a1a, roughness: 0.25, metalness: 0.15 })
);
scene.add(realCube);

// 거울 큐브 (조금 밝은 빨강)
const mirrorCube = new THREE.Mesh(
  cubeGeo,
  new THREE.MeshStandardMaterial({ color: 0xff7777, roughness: 0.25, metalness: 0.15 })
);
scene.add(mirrorCube);

// ── 바닥 가이드 (1.5m 기준선) ──────────────────────────────────
const guideGroup = new THREE.Group();
scene.add(guideGroup);
guideGroup.visible = false;

const barMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide });

// 수평 바
guideGroup.add(
  Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.012, 0.04), barMat))
);

// 양쪽 세로 포스트
[-0.58, 0.58].forEach(x => {
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.28, 0.04), barMat);
  post.position.set(x, 0.14, 0);
  guideGroup.add(post);
});

// 화살표
const arrowGeo = new THREE.ConeGeometry(0.06, 0.15, 4);
arrowGeo.rotateX(Math.PI / 2);
const arrow = new THREE.Mesh(arrowGeo, barMat);
arrow.position.set(0, 0.006, -0.12);
guideGroup.add(arrow);

// ────────────────────────────────────────────────────────────────
//  구체: 거울을 통과하는 오브젝트
//  거울 뒤 → 회색, 거울 통과 중 → 반반(클리핑), 거울 앞 → 파란색
// ────────────────────────────────────────────────────────────────
const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 32, 32);

// 회색 구체 (거울 뒤쪽 영역에만 표시)
const grayMat = new THREE.MeshStandardMaterial({
  color: 0x9e9e9e, roughness: 0.4, metalness: 0.5,
  transparent: true, opacity: 1
});
const graySphere = new THREE.Mesh(sphereGeo, grayMat);
graySphere.visible = false;
scene.add(graySphere);

// 파란 구체 (거울 앞쪽 영역에만 표시)
const blueMat = new THREE.MeshStandardMaterial({
  color: 0x1565c0, roughness: 0.15, metalness: 0.4,
  transparent: true, opacity: 1,
  emissive: new THREE.Color(0x0d47a1), emissiveIntensity: 0.35
});
const blueSphere = new THREE.Mesh(sphereGeo, blueMat);
blueSphere.visible = false;
scene.add(blueSphere);

// ── 거울 통과 이펙트 ─────────────────────────────────────────
// 1) 파문 링 3개: 거울 평면(XY)에서 바깥으로 퍼지는 동심원
const RIPPLE_COUNT = 3;
const rippleMeshes = [];
const rippleMats  = [];
for (let i = 0; i < RIPPLE_COUNT; i++) {
  // TorusGeometry는 기본으로 XY 평면에 위치 — 거울 면(Z법선)에 딱 맞음
  const rMat = new THREE.MeshBasicMaterial({
    color: 0x4fc3f7, transparent: true, opacity: 0, side: THREE.DoubleSide
  });
  const rMesh = new THREE.Mesh(new THREE.TorusGeometry(1, 0.018, 8, 48), rMat);
  rMesh.visible = false;
  scene.add(rMesh);
  rippleMeshes.push(rMesh);
  rippleMats.push(rMat);
}

// 2) 플래시 버스트: 교차점에서 팽창 후 소멸하는 반투명 구
const flashMat = new THREE.MeshBasicMaterial({
  color: 0x90caf9, transparent: true, opacity: 0
});
const flashMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), flashMat);
flashMesh.visible = false;
scene.add(flashMesh);

// 3) 포인트 라이트 플래시 (주변을 파랗게 순간 비춤)
const mirrorLight = new THREE.PointLight(0x4fc3f7, 0, 4);
scene.add(mirrorLight);

// 클리핑 플레인 — mirrorZ 확정 후 초기화
// grayClipPlane : z > mirrorZ 를 제거 (거울 뒤쪽만 보임)
// blueClipPlane : z < mirrorZ 를 제거 (거울 앞쪽만 보임)
// THREE.Plane 방정식: dot(normal, p) + constant < 0 이면 클리핑
let grayClipPlane = null;
let blueClipPlane = null;

// ────────────────────────────────────────────────────────────────
//  GLOBAL STATE
// ────────────────────────────────────────────────────────────────
let spawnPos       = null;   // { x, z } 최초 스폰 위치
let spawnEyeY      = 1.5;   // 눈높이 (m)
let mirrorZ        = 0;      // 거울 평면의 Z 좌표
let scenario       = 1;      // 1: 현실+거울, 2: 거울만
let currentSession = null;   // 활성 XR 세션 참조 (중복 요청 방지용)

// 구체 애니메이션
// phase: 'idle' | 'moving' | 'hovering' | 'rising'
//   idle    - 숨겨진 상태 (대기)
//   moving  - 거울 뒤에서 사용자 쪽으로 이동
//   hovering- 사용자 앞 0.5m에서 멈춰 떠있음
//   rising  - 위로 떠오르며 투명해지다 사라짐
let spherePhase     = 'idle';
let sphereZ         = 0;
let sphereY         = 1.5;
let sphereAlpha     = 1;
let sphereHoverTime = 0;
let prevTimestamp   = 0;

// 거울 이펙트 타이머
// -1 = 비활성, 0 이상 = 경과 시간(초)
let mirrorEffectTimer = -1;
let mirrorTouched     = false; // 이번 소환에서 이미 트리거됐는지

// ────────────────────────────────────────────────────────────────
//  HELPER
// ────────────────────────────────────────────────────────────────
function reflectZ(z) {
  return 2 * mirrorZ - z;
}

function resetSphereVisuals() {
  graySphere.visible = false;
  blueSphere.visible = false;
  grayMat.opacity    = 1;
  blueMat.opacity    = 1;
}

// ── 거울 통과 이펙트 트리거 ───────────────────────────────────
function triggerMirrorEffect(x, y, z) {
  mirrorEffectTimer = 0;

  // 링·플래시를 거울 교차 위치에 배치
  rippleMeshes.forEach((m, i) => {
    m.position.set(x, y, z);
    m.scale.setScalar(0.01);
    m.visible = true;
    rippleMats[i].opacity = 0;
  });

  flashMesh.position.set(x, y, z);
  flashMesh.scale.setScalar(0.01);
  flashMesh.visible = true;
  flashMat.opacity  = 0;

  mirrorLight.position.set(x, y, z);
  mirrorLight.intensity = 0;
}

// ── 거울 이펙트 매 프레임 업데이트 ──────────────────────────────
function updateMirrorEffect(dt) {
  if (mirrorEffectTimer < 0) return;
  mirrorEffectTimer += dt;

  const t = mirrorEffectTimer;
  const RING_DELAY    = 0.13;  // 링 간 딜레이 (초)
  const RING_DURATION = 0.65;  // 링 하나의 수명 (초)
  const MAX_RADIUS    = 0.55;  // 최대 반지름 (m)
  const TOTAL_TIME    = RING_DELAY * (RIPPLE_COUNT - 1) + RING_DURATION + 0.1;

  // 파문 링
  rippleMeshes.forEach((mesh, i) => {
    const localT = t - i * RING_DELAY;
    if (localT <= 0 || localT > RING_DURATION) {
      mesh.visible = false;
      return;
    }
    const p = localT / RING_DURATION;       // 0 → 1
    mesh.scale.setScalar(p * MAX_RADIUS);   // 반지름 확대
    rippleMats[i].opacity = (1 - p) * 0.75; // 서서히 투명
    mesh.visible = true;
  });

  // 플래시 버스트 (첫 0.25초에 팽창 후 소멸)
  const FLASH_DUR = 0.25;
  if (t < FLASH_DUR) {
    const fp = t / FLASH_DUR;
    flashMesh.scale.setScalar(fp * 0.3);
    flashMat.opacity = (1 - fp) * 0.9;
    flashMesh.visible = true;
  } else {
    flashMesh.visible = false;
  }

  // 포인트 라이트 (첫 0.3초에 강도 0→4→0)
  const LIGHT_DUR = 0.3;
  if (t < LIGHT_DUR) {
    const lp = t / LIGHT_DUR;
    mirrorLight.intensity = Math.sin(lp * Math.PI) * 4.0;
  } else {
    mirrorLight.intensity = 0;
  }

  // 이펙트 종료
  if (t > TOTAL_TIME) {
    mirrorEffectTimer = -1;
    rippleMeshes.forEach(m => { m.visible = false; });
    flashMesh.visible     = false;
    mirrorLight.intensity = 0;
  }
}

// ── 구체 소환 시작 ────────────────────────────────────────────
function startSphereAnimation() {
  sphereZ           = mirrorZ - 1.0;  // 거울 뒤 1m 지점에서 시작
  sphereY           = spawnEyeY;      // 스폰 시점 눈높이에 고정
  spherePhase       = 'moving';
  sphereAlpha       = 1;
  grayMat.opacity   = 1;
  blueMat.opacity   = 1;
  mirrorTouched     = false;          // 이펙트 트리거 리셋
  mirrorEffectTimer = -1;
}

// ── 구체 업데이트 (매 프레임) ─────────────────────────────────
function updateSphere(timestamp, userZ) {
  if (spherePhase === 'idle' || !spawnPos) {
    resetSphereVisuals();
    return;
  }

  // delta time (max 50ms 캡 — 프레임 드랍 방지)
  const dt = prevTimestamp > 0
    ? Math.min((timestamp - prevTimestamp) / 1000, 0.05)
    : 0.016;

  // ── State machine ────────────────────────────────────────────
  if (spherePhase === 'moving') {
    // 거울 뒤 → 사용자 앞 SPHERE_STOP_DIST 지점까지 이동
    sphereZ += SPHERE_MOVE_SPEED * dt;
    const stopZ = userZ - SPHERE_STOP_DIST;
    if (sphereZ >= stopZ) {
      sphereZ = stopZ;
      spherePhase     = 'hovering';
      sphereHoverTime = SPHERE_HOVER_TIME;
    }

  } else if (spherePhase === 'hovering') {
    // 멈춰서 천천히 떠다님 (미세 전진 없음 — 위협감만 유지)
    sphereHoverTime -= dt;
    if (sphereHoverTime <= 0) {
      spherePhase = 'rising';
    }

  } else if (spherePhase === 'rising') {
    // 위로 떠오르며 사라짐
    sphereY     += SPHERE_RISE_SPEED * dt;
    sphereAlpha -= SPHERE_FADE_SPEED * dt;
    grayMat.opacity = Math.max(sphereAlpha, 0);
    blueMat.opacity = Math.max(sphereAlpha, 0);

    if (sphereAlpha <= 0) {
      spherePhase = 'idle';
      resetSphereVisuals();
      btnSummon.textContent = '구체 소환';
      btnSummon.classList.remove('active');
      return;
    }
  }

  // ── 위치: 자연스러운 위아래 보빙(bob) 추가 ───────────────────
  const bob = Math.sin(timestamp * 0.0025) * 0.015;
  const posX = spawnPos.x;
  const posY = sphereY + bob;
  const posZ = sphereZ;

  graySphere.position.set(posX, posY, posZ);
  blueSphere.position.set(posX, posY, posZ);

  // ── 거울 기준 클리핑 & 가시성 결정 ──────────────────────────
  //  fullyBehind  : 구체 전체가 거울 뒤 → 회색만
  //  fullyInFront : 구체 전체가 거울 앞 → 파란색만
  //  crossing     : 거울 면에 걸쳐 있음 → 반반 클리핑
  const fullyBehind  = posZ < mirrorZ - SPHERE_RADIUS;
  const fullyInFront = posZ > mirrorZ + SPHERE_RADIUS;

  if (fullyBehind) {
    // 클리핑 해제 — 구체 전체 회색
    grayMat.clippingPlanes = [];
    graySphere.visible = true;
    blueSphere.visible = false;

  } else if (fullyInFront) {
    // 클리핑 해제 — 구체 전체 파란색
    blueMat.clippingPlanes = [];
    graySphere.visible = false;
    blueSphere.visible = true;

  } else {
    // 거울 통과 중: 두 구체를 거울 평면으로 잘라서 동시에 표시
    grayMat.clippingPlanes = [grayClipPlane];
    blueMat.clippingPlanes = [blueClipPlane];
    graySphere.visible = true;
    blueSphere.visible = true;

    // 첫 crossing 진입 시 이펙트 1회 트리거
    if (!mirrorTouched) {
      mirrorTouched = true;
      triggerMirrorEffect(posX, posY, mirrorZ);
    }
  }

  // 이펙트 애니메이션 진행
  updateMirrorEffect(dt);
}

// ────────────────────────────────────────────────────────────────
//  UI
// ────────────────────────────────────────────────────────────────
const statusEl  = document.getElementById('status');
const toggleBtn = document.getElementById('btnToggle');
const btnSummon = document.getElementById('btnSummon');

function setStatus(text) { statusEl.textContent = text; }

toggleBtn.onclick = () => {
  scenario = scenario === 1 ? 2 : 1;
  if (scenario === 1) {
    toggleBtn.textContent = '시나리오 전환';
    toggleBtn.classList.remove('off');
    setStatus('시나리오 1 — 현실 큐브 ON + 거울 큐브 | 전환 버튼으로 시나리오 2');
  } else {
    toggleBtn.textContent = '시나리오 1로 돌아가기';
    toggleBtn.classList.add('off');
    setStatus('시나리오 2 — 거울 큐브만 (현실에선 안 보임)');
  }
};

btnSummon.onclick = () => {
  if (!spawnPos) return;

  if (spherePhase !== 'idle') {
    // 애니메이션 중 → 즉시 리셋
    spherePhase = 'idle';
    resetSphereVisuals();
    btnSummon.textContent = '구체 소환';
    btnSummon.classList.remove('active');
    return;
  }

  startSphereAnimation();
  btnSummon.textContent = '소환 취소';
  btnSummon.classList.add('active');
};

// ────────────────────────────────────────────────────────────────
//  AR SESSION
// ────────────────────────────────────────────────────────────────
const btnStart = document.getElementById('btnStart');

function enterSessionUI(session) {
  currentSession = session;
  btnStart.textContent = 'AR 종료';
  btnStart.classList.add('ending');
  document.getElementById('hint').style.display = 'none';
  toggleBtn.style.display = 'inline-block';
  btnSummon.style.display = 'inline-block';
}

function exitSessionUI() {
  currentSession = null;
  btnStart.textContent = 'AR 시작';
  btnStart.classList.remove('ending');
  toggleBtn.style.display = 'none';
  btnSummon.style.display = 'none';
  btnSummon.textContent = '구체 소환';
  btnSummon.classList.remove('active');
  spawnPos = null;
  guideGroup.visible = false;
  spherePhase = 'idle';
  resetSphereVisuals();
  setStatus('세션 종료됨');
  renderer.setAnimationLoop(null);
}

btnStart.onclick = async () => {
  // 세션이 이미 활성화 → 종료
  if (currentSession) {
    currentSession.end();
    return;
  }

  if (!navigator.xr) {
    setStatus('⚠ WebXR 없음 — Quest 브라우저인가요?');
    return;
  }

  const ok = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!ok) {
    setStatus('⚠ immersive-ar 미지원 — Quest 브라우저 + 최신 OS 필요');
    return;
  }

  let session;
  try {
    session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('ui') }
    });
  } catch (e) {
    setStatus('⚠ 세션 시작 실패: ' + e.message);
    return;
  }

  await renderer.xr.setSession(session);
  const refSpace = await session.requestReferenceSpace('local-floor');

  enterSessionUI(session);
  setStatus('⏳ 스폰 위치 초기화 중...');

  // 메타 버튼으로 세션이 blurred 상태가 됐을 때 처리
  session.addEventListener('visibilitychange', () => {
    // visible-blurred: 메타 시스템 오버레이가 앞에 떠 있는 상태
    // 세션은 살아있으므로 아무것도 하지 않음 — 버튼 상태도 그대로 유지
    // (이전에 btnStart가 노출된 채로 클릭되던 문제는 currentSession 가드로 차단됨)
    if (session.visibilityState === 'visible') {
      setStatus('▶ AR 재개됨');
    }
  });

  session.addEventListener('end', exitSessionUI);

  // ── 메인 루프 ──────────────────────────────────────────────
  renderer.setAnimationLoop((timestamp, frame) => {
    if (!frame) { renderer.render(scene, camera); return; }

    const pose = frame.getViewerPose(refSpace);
    if (!pose) { renderer.render(scene, camera); return; }

    const h = pose.transform.position; // 헤드 위치

    // ── 최초 1회: 스폰 포지션 & 거울 평면 기록 ──────────────
    if (!spawnPos) {
      spawnPos  = { x: h.x, z: h.z };
      spawnEyeY = h.y;                    // 눈높이 저장
      mirrorZ   = h.z - MIRROR_DIST;      // 사용자 앞 1.5m = 거울

      // ── 클리핑 플레인 초기화 ──────────────────────────────
      // dot(normal, p) + constant < 0 이면 그 픽셀은 잘린다(보이지 않음)
      //   grayClipPlane: clip z > mirrorZ  → n=(0,0,-1), c=mirrorZ
      //     -pz + mirrorZ < 0  →  pz > mirrorZ  (거울 앞쪽 제거)
      //   blueClipPlane: clip z < mirrorZ  → n=(0,0,1),  c=-mirrorZ
      //     pz - mirrorZ < 0   →  pz < mirrorZ  (거울 뒤쪽 제거)
      grayClipPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1),  mirrorZ);
      blueClipPlane = new THREE.Plane(new THREE.Vector3(0, 0,  1), -mirrorZ);

      guideGroup.position.set(h.x, 0.005, mirrorZ);
      guideGroup.visible = true;

      setStatus(
        `✓ 준비 완료 | 시안색 선 = 거울 위치(앞 ${MIRROR_DIST}m) | 구체 소환 버튼으로 링 연출`
      );
    }

    // ── 큐브 위치: 머리 위 30cm, 실시간 추적 ─────────────────
    const cx = h.x;
    const cy = h.y + HEAD_ABOVE;
    const cz = h.z;

    realCube.position.set(cx, cy, cz);
    realCube.visible = (scenario === 1);

    const mz = reflectZ(cz);
    mirrorCube.position.set(cx, cy, mz);
    mirrorCube.visible = true;

    // ── 구체 업데이트 ─────────────────────────────────────
    updateSphere(timestamp, h.z);
    prevTimestamp = timestamp;

    renderer.render(scene, camera);
  });
};
</script>
